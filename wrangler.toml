ENVIRONMENT = "production"
NODE_ENV = "production"
BUN_VERSION = "1.1.27"

VITE_USER_NODE_ENV = "production"
VITE_CLOUDINARY_CLOUD_NAME = "dg6vtsga1"
VITE_CLOUDINARY_API_KEY = "226917649845399"
VITE_CLOUDINARY_UPLOAD_PRESET = "ml_default"

PUBLIC_MAPTILER_KEY = "SMf0v0mZlsqfCMBgZdy1"
