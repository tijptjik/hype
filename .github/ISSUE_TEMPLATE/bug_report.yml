name: Bug Report
description: Report a bug or issue
title: '[BUG] '
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: Describe what should happen...

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: Describe what actually happened...

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Screenshots or videos showing the issue
      placeholder: Drag and drop screenshots here...

  - type: input
    id: browser
    attributes:
      label: Browser/Environment
      description: Browser, device, or environment where this occurs
      placeholder: Chrome 120, Mobile Safari, etc.
