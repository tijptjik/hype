name: "DEPLOY :: Cloudflare"

on:
  push:
    branches:
      - main
      - preview

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}

  test:
    needs: build
    uses: ./.github/workflows/test.yml
    with:
      environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}

  deploy-to-prod:
    name: Deploy to Cloudflare [Production]
    needs: [build, test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: 'GIT :: Checkout'
        uses: actions/checkout@v4

      - name: 'CACHE :: Bun installation'
        uses: actions/cache@v3
        id: cache-bun
        with:
          path: |
            ~/.bun
            ~/.cache/bun
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: 'INSTALL :: Bun'
        if: steps.cache-bun.outputs.cache-hit != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.15'

      - name: 'CACHE :: Build artifacts'
        uses: actions/cache@v3
        with:
          path: |
            build
            .svelte-kit
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: 'DB :: Apply migrations'
        run: bun run db:migration:run:cf:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 'DEPLOY :: Cloudflare Worker'
        run: bun run deploy:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-to-preview:
    name: Deploy to Cloudflare [Preview]
    needs: [build, test]
    if: github.ref == 'refs/heads/preview'
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - name: 'GIT :: Checkout'
        uses: actions/checkout@v4

      - name: 'CACHE :: Build artifacts'
        uses: actions/cache@v3
        with:
          path: |
            build
            .svelte-kit
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: 'DB :: Apply migrations'
        run: bun run db:migration:run:cf:preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 'DEPLOY :: Cloudflare Worker'
        run: bun run deploy:preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
