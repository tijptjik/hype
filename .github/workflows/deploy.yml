name: "DEPLOY :: Cloudflare"

on:
  push:
    branches:
      - main
      - preview

jobs:
  build:
    if: github.ref == 'refs/heads/preview'
    uses: ./.github/workflows/build.yml
    with:
      environment: 'preview'

  test:
    if: github.ref == 'refs/heads/preview'
    needs: build
    uses: ./.github/workflows/test.yml
    with:
      environment: 'preview'

  deploy-preview:
    name: 'DEPLOY :: Preview'
    if: github.ref == 'refs/heads/preview'
    needs: [build, test]
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - name: 'GIT :: Checkout'
        uses: actions/checkout@v4

      - name: 'INSTALL :: Bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.15'

      - name: 'CACHE :: Restore Dependencies'
        uses: actions/cache@v3
        id: cache-deps
        with:
          path: node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: 'INSTALL :: Dependencies'
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: 'CACHE :: Restore Build'
        uses: actions/cache@v3
        with:
          path: .svelte-kit
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: 'DB :: Apply migrations'
        run: bun run db:migration:run:cf:preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 'DEPLOY :: Cloudflare Worker'
        run: bun run deploy:preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-production:
    name: 'DEPLOY :: Production'
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: 'GIT :: Checkout'
        uses: actions/checkout@v4

      - name: 'INSTALL :: Bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.15'

      - name: 'CACHE :: Restore Dependencies'
        uses: actions/cache@v3
        id: cache-deps
        with:
          path: node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: 'INSTALL :: Dependencies'
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: 'CACHE :: Restore Build (from Preview)'
        uses: actions/cache@v3
        id: cache-build
        with:
          path: .svelte-kit
          key: ${{ runner.os }}-build-${{ github.sha }}
          fail-on-cache-miss: true

      - name: 'VERIFY :: Build Cache'
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: |
          echo "❌ No preview build found for commit ${{ github.sha }}"
          echo "This commit must be deployed to preview first before promoting to production"
          exit 1

      - name: 'DB :: Apply migrations'
        run: bun run db:migration:run:cf:production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 'DEPLOY :: Cloudflare Worker'
        run: bun run deploy:production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
