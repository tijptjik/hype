name: "DEPLOY :: Cloudflare"

on:
  push:
    branches:
      - main
      - preview

jobs:
  deploy-to-prod:
    name: Deploy to Cloudflare [Production]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: 'GIT :: Checkout'
        uses: actions/checkout@v4

      - name: 'INSTALL :: Bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.15'

      - name: 'INSTALL :: Dependencies'
        run: bun install --frozen-lockfile

      - name: 'SYNC :: Generate SvelteKit files'
        run: bun run sync

      - name: 'FIX :: Create temporary tsconfig for CI'
        run: |
          # Backup original tsconfig
          mv tsconfig.json tsconfig.json.bak
          # Create minimal tsconfig for CI
          cat > tsconfig.json << 'EOF'
          {
            "compilerOptions": {
              "target": "ES2022",
              "lib": ["ES2022"],
              "module": "ESNext",
              "moduleResolution": "node",
              "allowJs": true,
              "checkJs": true,
              "esModuleInterop": true,
              "allowSyntheticDefaultImports": true,
              "forceConsistentCasingInFileNames": true,
              "resolveJsonModule": true,
              "skipLibCheck": true,
              "sourceMap": true,
              "strict": true,
              "baseUrl": ".",
              "paths": {
                "$lib": ["./src/lib"],
                "$lib/*": ["./src/lib/*"]
              }
            },
            "include": [
              "src/**/*.ts",
              "src/**/*.d.ts"
            ],
            "exclude": [
              "node_modules",
              ".svelte-kit",
              "src/lib/paraglide/**/*"
            ]
          }
          EOF

      - name: 'TEST :: Run tests'
        run: bun run test:run

      - name: 'FIX :: Restore original tsconfig'
        run: mv tsconfig.json.bak tsconfig.json

      - name: 'BUILD :: Application'
        run: bun run build
        env:
          # Private variables (secrets)
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
          AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
          AZURE_TRANSLATION_KEY: ${{ secrets.AZURE_TRANSLATION_KEY }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_DATABASE_ID: ${{ secrets.CLOUDFLARE_DATABASE_ID }}
          CLOUDFLARE_D1_TOKEN: ${{ secrets.CLOUDFLARE_D1_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Public variables (vars)
          PUBLIC_AUTH_URL: ${{ vars.PUBLIC_AUTH_URL }}
          PUBLIC_AZURE_TRANSLATION_REGION: ${{ vars.PUBLIC_AZURE_TRANSLATION_REGION }}
          PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ vars.PUBLIC_CLOUDINARY_CLOUD_NAME }}
          PUBLIC_CLOUDINARY_UPLOAD_PRESET: ${{ vars.PUBLIC_CLOUDINARY_UPLOAD_PRESET }}
          PUBLIC_GIPHY_KEY: ${{ vars.PUBLIC_GIPHY_KEY }}
          PUBLIC_HUB_CODE: ${{ vars.PUBLIC_HUB_CODE }}
          PUBLIC_PROXY_PROTOMAP_TILES: ${{ vars.PUBLIC_PROXY_PROTOMAP_TILES }}
          PUBLIC_DRIZZLE_LOGGER: ${{ vars.PUBLIC_DRIZZLE_LOGGER }}
          PUBLIC_SVELTE_QUERY_DEVTOOLS: ${{ vars.PUBLIC_SVELTE_QUERY_DEVTOOLS }}
          CLOUDFLARE_ENV: prod

      - name: 'DB :: Apply migrations'
        run: bun run db:migration:run:cf:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 'DEPLOY :: Cloudflare Worker'
        run: bun run deploy:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-to-preview:
    name: Deploy to Cloudflare [Preview]
    if: github.ref == 'refs/heads/preview'
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - name: 'GIT :: Checkout'
        uses: actions/checkout@v4

      - name: 'INSTALL :: Bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.15'

      - name: 'INSTALL :: Dependencies'
        run: bun install --frozen-lockfile

      - name: 'SYNC :: Generate SvelteKit files'
        run: bun run sync

      - name: 'FIX :: Create temporary tsconfig for CI'
        run: |
          # Backup original tsconfig
          mv tsconfig.json tsconfig.json.bak
          # Create minimal tsconfig for CI
          cat > tsconfig.json << 'EOF'
          {
            "compilerOptions": {
              "target": "ES2022",
              "lib": ["ES2022"],
              "module": "ESNext",
              "moduleResolution": "node",
              "allowJs": true,
              "checkJs": true,
              "esModuleInterop": true,
              "allowSyntheticDefaultImports": true,
              "forceConsistentCasingInFileNames": true,
              "resolveJsonModule": true,
              "skipLibCheck": true,
              "sourceMap": true,
              "strict": true,
              "baseUrl": ".",
              "paths": {
                "$lib": ["./src/lib"],
                "$lib/*": ["./src/lib/*"]
              }
            },
            "include": [
              "src/**/*.ts",
              "src/**/*.d.ts"
            ],
            "exclude": [
              "node_modules",
              ".svelte-kit",
              "src/lib/paraglide/**/*"
            ]
          }
          EOF

      - name: 'TEST :: Run tests'
        run: bun run test:run

      - name: 'FIX :: Restore original tsconfig'
        run: mv tsconfig.json.bak tsconfig.json

      - name: 'BUILD :: Application'
        run: bun run build
        env:
          # Private variables (secrets)
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
          AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
          AZURE_TRANSLATION_KEY: ${{ secrets.AZURE_TRANSLATION_KEY }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_DATABASE_ID: ${{ secrets.CLOUDFLARE_DATABASE_ID }}
          CLOUDFLARE_D1_TOKEN: ${{ secrets.CLOUDFLARE_D1_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Public variables (vars)
          PUBLIC_AUTH_URL: ${{ vars.PUBLIC_AUTH_URL }}
          PUBLIC_AZURE_TRANSLATION_REGION: ${{ vars.PUBLIC_AZURE_TRANSLATION_REGION }}
          PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ vars.PUBLIC_CLOUDINARY_CLOUD_NAME }}
          PUBLIC_CLOUDINARY_UPLOAD_PRESET: ${{ vars.PUBLIC_CLOUDINARY_UPLOAD_PRESET }}
          PUBLIC_GIPHY_KEY: ${{ vars.PUBLIC_GIPHY_KEY }}
          PUBLIC_HUB_CODE: ${{ vars.PUBLIC_HUB_CODE }}
          PUBLIC_PROXY_PROTOMAP_TILES: ${{ vars.PUBLIC_PROXY_PROTOMAP_TILES }}
          PUBLIC_DRIZZLE_LOGGER: ${{ vars.PUBLIC_DRIZZLE_LOGGER }}
          PUBLIC_SVELTE_QUERY_DEVTOOLS: ${{ vars.PUBLIC_SVELTE_QUERY_DEVTOOLS }}
          CLOUDFLARE_ENV: preview

      - name: 'DB :: Apply migrations'
        run: bun run db:migration:run:cf:preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 'DEPLOY :: Cloudflare Worker'
        run: bun run deploy:preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
