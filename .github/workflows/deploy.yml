name: "DEPLOY :: Cloudflare"

on:
  push:
    branches:
      - main
      - preview

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}

  test:
    needs: build
    uses: ./.github/workflows/test.yml
    with:
      environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}

  deploy:
    name: 'DEPLOY :: Cloudflare'
    needs: [build, test]
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'preview' }}
    steps:
      - name: 'GIT :: Checkout'
        uses: actions/checkout@v4

      - name: 'INSTALL :: Bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.15'

      - name: 'CACHE :: Restore Dependencies'
        uses: actions/cache@v3
        id: cache-deps
        with:
          path: node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: 'INSTALL :: Dependencies'
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: 'CACHE :: Restore Build'
        uses: actions/cache@v3
        with:
          path: .svelte-kit
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: 'DB :: Apply migrations'
        run: bun run db:migration:run:cf:${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 'DEPLOY :: Cloudflare Worker'
        run: bun run deploy:${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
