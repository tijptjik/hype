name: 'DEPLOY :: Cloudflare'

on:
  push:
    branches:
      - main
      - preview

jobs:
  build:
    if: github.ref == 'refs/heads/preview'
    uses: ./.github/workflows/build.yml
    with:
      environment: 'preview'

  test:
    if: github.ref == 'refs/heads/preview'
    needs: build
    uses: ./.github/workflows/test.yml
    with:
      environment: 'preview'

  deploy-preview:
    name: 'DEPLOY :: Preview'
    if: github.ref == 'refs/heads/preview'
    needs: [build, test]
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - name: 'GIT :: Checkout'
        uses: actions/checkout@v4

      - name: 'INSTALL :: Bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.18'

      - name: 'CACHE :: Restore Dependencies'
        uses: actions/cache@v3
        id: cache-deps
        with:
          path: node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('**/bun.lock') }}

      - name: 'INSTALL :: Dependencies'
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: 'CACHE :: Restore Build'
        uses: actions/cache@v3
        id: cache-build-preview
        with:
          path: |
            .svelte-kit
            node_modules/.vite
          key: ${{ runner.os }}-build-${{ hashFiles('src/**', 'package.json', 'bun.lock', 'svelte.config.js', 'vite.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ hashFiles('src/**', 'package.json', 'bun.lock', 'svelte.config.js', 'vite.config.ts') }}

      - name: 'BUILD :: Application (if cache miss)'
        if: steps.cache-build-preview.outputs.cache-hit != 'true'
        run: bun run build:cf:preview
        env:
          CLOUDFLARE_ENV: preview

      - name: 'BUILD :: Application (if cache miss)'
        if: steps.cache-build-preview.outputs.cache-hit != 'true'
        run: bun run build:cf:preview
        env:
          CLOUDFLARE_ENV: preview

      - name: 'DB :: Apply migrations'
        run: bun run db:migration:run:cf:preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 'DEPLOY :: Cloudflare Worker'
        run: bun run deploy:preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-production:
    name: 'DEPLOY :: Production'
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: 'GIT :: Checkout'
        uses: actions/checkout@v4

      - name: 'INSTALL :: Bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.18'

      - name: 'CACHE :: Restore Dependencies'
        uses: actions/cache@v3
        id: cache-deps
        with:
          path: node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('**/bun.lock') }}

      - name: 'INSTALL :: Dependencies'
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: 'CACHE :: Restore Build (from Preview)'
        uses: actions/cache@v3
        id: cache-build
        with:
          path: |
            .svelte-kit
            node_modules/.vite
          key: ${{ runner.os }}-build-${{ hashFiles('src/**', 'package.json', 'bun.lock', 'svelte.config.js', 'vite.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: 'DEBUG :: Cache Status'
        run: |
          echo "Cache hit status: ${{ steps.cache-build.outputs.cache-hit }}"
          echo "Cache key used: ${{ runner.os }}-build-${{ hashFiles('src/**', 'package.json', 'bun.lock', 'svelte.config.js', 'vite.config.ts') }}"
          echo "Build directory exists: $(test -d .svelte-kit && echo 'yes' || echo 'no')"
          echo "Vite cache exists: $(test -d node_modules/.vite && echo 'yes' || echo 'no')"
          if [ -d .svelte-kit ]; then
            echo "Build directory contents:"
            ls -la .svelte-kit/ | head -10
            echo "SvelteKit build output size:"
            du -sh .svelte-kit/
          fi

      - name: 'BUILD :: Application (if cache miss)'
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: bun run build:cf:prod
        env:
          CLOUDFLARE_ENV: production

      - name: 'VERIFY :: Build Cache'
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: |
          echo "⚠️ No exact build cache found for file hash ${{ hashFiles('src/**', 'package.json', 'bun.lock', 'svelte.config.js', 'vite.config.ts') }}"
          echo "Files changed since last build - rebuilding required"
          echo "Rebuilt application for production deployment"

      - name: 'DB :: Apply migrations'
        run: bun run db:migration:run:cf:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 'DEPLOY :: Cloudflare Worker'
        run: bun run deploy:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
