name: "BUILD :: Build Application"

on:
  workflow_call:
    inputs:
      environment: # production, preview
        required: true
        type: string
    outputs:
      build-cache-hit:
        description: "Whether the build cache was hit"
        value: ${{ jobs.build.outputs.cache-hit }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache-deps.outputs.cache-hit }}
    steps:
      - name: 'GIT :: Checkout'
        uses: actions/checkout@v4

      - name: 'INSTALL :: Bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.15'

      - name: 'CACHE :: Dependencies'
        uses: actions/cache@v3
        id: cache-deps
        with:
          path: |
            node_modules
            .svelte-kit
          key: ${{ runner.os }}-deps-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: 'INSTALL :: Dependencies'
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: 'SYNC :: Generate SvelteKit files'
        run: bun run sync

      - name: 'BUILD :: Build application'
        run: bun run build:cf:${{ inputs.environment }}
        env:
          CLOUDFLARE_ENV: ${{ inputs.environment }}

      - name: 'CACHE :: Build artifacts'
        uses: actions/cache@v3
        with:
          path: |
            build
            .svelte-kit
          key: ${{ runner.os }}-build-${{ github.sha }} 