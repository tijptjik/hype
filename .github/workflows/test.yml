name: "TEST :: Run Tests"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    outputs:
      test-status:
        description: "Status of the test run"
        value: ${{ jobs.test.outputs.status }}

jobs:
  test:
    name: 'TEST :: Run'
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.test.outputs.status }}
    steps:
      - name: 'GIT :: Checkout'
        uses: actions/checkout@v4

      - name: 'INSTALL :: Bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.16'

      - name: 'CACHE :: Restore Dependencies'
        uses: actions/cache@v3
        id: cache-deps
        with:
          path: node_modules
          key: ${{ runner.os }}-deps-${{ hashFiles('**/bun.lock') }}

      - name: 'INSTALL :: Dependencies'
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: 'CACHE :: Restore Build'
        uses: actions/cache@v3
        with:
          path: |
            .svelte-kit
            node_modules/.vite
          key: ${{ runner.os }}-build-${{ hashFiles('src/**', 'package.json', 'bun.lock', 'svelte.config.js', 'vite.config.ts') }}

      - name: 'FIX :: Create temporary tsconfig for CI'
        run: |
          # Create minimal tsconfig for CI
          cat > tsconfig.json << 'EOF'
          {
            "compilerOptions": {
              "target": "ES2022",
              "lib": ["ES2022"],
              "module": "ESNext",
              "moduleResolution": "node",
              "allowJs": true,
              "checkJs": true,
              "esModuleInterop": true,
              "allowSyntheticDefaultImports": true,
              "forceConsistentCasingInFileNames": true,
              "resolveJsonModule": true,
              "skipLibCheck": true,
              "sourceMap": true,
              "strict": true,
              "baseUrl": ".",
              "paths": {
                "$lib": ["./src/lib"],
                "$lib/*": ["./src/lib/*"]
              }
            },
            "include": [
              "src/**/*.ts",
              "src/**/*.d.ts"
            ],
            "exclude": [
              "node_modules",
              ".svelte-kit",
              "src/lib/paraglide/**/*"
            ]
          }
          EOF

      - name: 'TEST :: Run tests'
        id: test
        run: |
          mkdir -p test-results
          bun run test:run

      - name: 'CACHE :: Test results'
        uses: actions/cache@v3
        with:
          path: test-results
          key: ${{ runner.os }}-test-${{ github.sha }} 