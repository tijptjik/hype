#:schema ../../node_modules/wrangler/config-schema.json
name = "hype-render-service"
main = "src/index.ts"
compatibility_date = "2026-03-19"
compatibility_flags = ["nodejs_compat"]
send_metrics = false
workers_dev = false

[observability]
enabled = true

[env.preview]
name = "hype-render-service-preview"

[env.preview.vars]
ENVIRONMENT = "preview"
RENDER_PUBLIC_BASE_URL = "https://assets.preview.hype.hk"

[[env.preview.r2_buckets]]
binding = "RENDER_ASSETS"
bucket_name = "hype-assets-preview"

[[env.preview.queues.consumers]]
queue = "hype-map-render-jobs-preview"
max_batch_size = 1
max_batch_timeout = 5

[env.production]
name = "hype-render-service-prod"

[env.production.vars]
ENVIRONMENT = "production"
RENDER_PUBLIC_BASE_URL = "https://assets.hype.hk"

[[env.production.r2_buckets]]
binding = "RENDER_ASSETS"
bucket_name = "hype-assets-prod"

[[env.production.queues.consumers]]
queue = "hype-map-render-jobs-prod"
max_batch_size = 1
max_batch_timeout = 5
